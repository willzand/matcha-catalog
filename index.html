<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Matcha Catalog</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --bg: #f5f5f5; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .nav-bar { display: flex; justify-content: space-around; background: white; padding: 10px 0; border-top: 1px solid #eee; position: fixed; bottom: 0; width: 100%; }
        .nav-item { cursor: pointer; color: #666; font-size: 0.9em; text-align: center; flex: 1; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        input, select, button { font-family: 'Kanit', sans-serif; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-green { background: var(--primary); color: white; }
        .btn-outline { background: none; border: 1px solid #ccc; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; color:var(--primary);">🍵 My Matcha</h2>
</div>

<div id="toast" class="toast">บันทึกเรียบร้อย</div>

<div class="container">
    <div id="shop-section">
        <div id="product-list"></div>
    </div>

    <div id="status-section" style="display:none;">
        <h3 style="text-align:center;">เช็คสถานะสินค้า</h3>
        <input type="text" id="search-input" placeholder="ใส่ชื่อ หรือ เลขที่ออเดอร์" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:15px; box-sizing: border-box;">
        <button class="btn btn-blue" onclick="loadStatus()">🔍 ค้นหา</button>
        <div id="status-result" style="margin-top:20px;"></div>
    </div>

    <div id="admin-section" style="display:none;">
        <div id="admin-login">
            <h3 style="text-align:center;">แอดมินเข้าสู่ระบบ</h3>
            <input type="password" id="admin-pass" placeholder="รหัสผ่าน" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:10px; box-sizing: border-box;">
            <button class="btn btn-blue" onclick="checkAdmin()">ตกลง</button>
        </div>
        <div id="admin-content" style="display:none;">
            <h3 style="text-align:center;">จัดการออเดอร์</h3>
            <div id="admin-orders-list"></div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSection('shop')">🛒 สินค้า</div>
    <div id="cart-btn" class="nav-item" onclick="showCart()">📦 ตะกร้า (0)</div>
    <div class="nav-item" onclick="showSection('status')">🔍 สถานะ</div>
    <div class="nav-item" onclick="showSection('admin')">⚙️ แอดมิน</div>
</div>

<script>
    const LIFF_ID = "2009818831-5fiCjFHH";
    const API_URL = "https://script.google.com/macros/s/AKfycbyqTpO3AAjoWrNd3V1Frgy8Z5MbKtQC_gD2aWeytPAhfAdPMwbOMtYn8qd7B7HM50ZR/exec";
    
    let cart = [];
    let lineProfile = null;

    async function initLiff() {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
            lineProfile = await liff.getProfile();
        } else {
            liff.login();
        }
        loadProducts();
    }
    initLiff();

    function showSection(name) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('shop-section').style.display = 'none';
        document.getElementById('status-section').style.display = 'none';
        document.getElementById('admin-section').style.display = 'none';
        
        document.getElementById(name + '-section').style.display = 'block';
        if (name === 'admin') document.querySelector('.nav-item:nth-child(4)').classList.add('active');
        else if (name === 'status') document.querySelector('.nav-item:nth-child(3)').classList.add('active');
        else document.querySelector('.nav-item:nth-child(1)').classList.add('active');
    }

    async function loadProducts() {
        const list = document.getElementById('product-list');
        list.innerHTML = 'กำลังโหลดสินค้า...';
        const resp = await fetch(`${API_URL}?action=getProducts`);
        const products = await resp.json();
        list.innerHTML = '';
        products.forEach(p => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <strong>${p.name}</strong>
                    <span style="color:var(--primary)">${p.priceJPY} JPY</span>
                </div>
                <p style="font-size:0.8em; color:#666; margin:5px 0;">${p.brand} | ${p.taste}</p>
                <button class="btn btn-outline" style="padding:5px;" onclick="addToCart('${p.name}', ${p.priceJPY})">+ ใส่ตะกร้า</button>
            `;
            list.appendChild(div);
        });
    }

    function addToCart(name, price) {
        cart.push({ name, price });
        document.getElementById('cart-btn').innerText = `📦 ตะกร้า (${cart.length})`;
        showToast("เพิ่มลงตะกร้าแล้ว");
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    // --- Admin Logic (New Card Layout) ---
    function checkAdmin() {
        if (document.getElementById('admin-pass').value === "2602") {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadAdminOrders();
        } else { alert("รหัสผิด"); }
    }

    async function loadAdminOrders() {
        const container = document.getElementById('admin-orders-list');
        container.innerHTML = '⏳ กำลังโหลดรายการ...';
        const resp = await fetch(`${API_URL}?action=getOrders`);
        const orders = await resp.json();
        container.innerHTML = '';

        orders.reverse().forEach(order => {
            const items = JSON.parse(order.cart);
            const itemsHtml = items.map(i => `• ${i.name} (x${i.qty})`).join('<br>');
            
            const div = document.createElement('div');
            div.className = 'card';
            div.style.borderLeft = "6px solid var(--primary)";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span class="badge" style="background:#e8f5e9; color:var(--primary)">#${order.orderId}</span>
                    <small style="color:#999">${order.timestamp}</small>
                </div>
                <div style="font-weight:bold; margin-bottom:8px;">คุณ ${order.customerName}</div>
                <div style="font-size:0.9em; background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:12px;">
                    ${itemsHtml}
                    <div style="text-align:right; font-weight:bold; color:var(--secondary); margin-top:5px;">รวม ${order.totalTHB.toLocaleString()} THB</div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1.2fr; gap:10px; margin-bottom:12px;">
                    <div>
                        <label style="font-size:0.75em; color:#777;">จำนวนที่ได้จริง:</label>
                        <input type="number" id="qty-${order.row}" value="${order.actualQty || 0}" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:6px;">
                    </div>
                    <div>
                        <label style="font-size:0.75em; color:#777;">สถานะ:</label>
                        <select id="status-${order.row}" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:6px;">
                            <option value="รอตรวจสอบ" ${order.status==='รอตรวจสอบ'?'selected':''}>รอตรวจสอบ</option>
                            <option value="กำลังเตรียมของ" ${order.status==='กำลังเตรียมของ'?'selected':''}>กำลังเตรียมของ</option>
                            <option value="พร้อมส่ง" ${order.status==='พร้อมส่ง'?'selected':''}>พร้อมส่ง</option>
                            <option value="ส่งแล้ว" ${order.status==='ส่งแล้ว'?'selected':''}>ส่งแล้ว</option>
                            <option value="ยกเลิก" ${order.status==='ยกเลิก'?'selected':''}>ยกเลิก</option>
                        </select>
                    </div>
                </div>

                <div style="display:flex; gap:8px;">
                    <button class="btn btn-blue" id="save-${order.row}" onclick="updateOnly(${order.row})" style="flex:1;">💾 อัปเดต</button>
                    <button class="btn btn-green" id="line-${order.row}" onclick="notifyLine('${order.row}', '${order.lineUserId}', '${order.orderId}')" style="flex:1;">🔔 แจ้ง LINE</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function updateOnly(row) {
        const qty = document.getElementById(`qty-${row}`).value;
        const status = document.getElementById(`status-${row}`).value;
        const btn = document.getElementById(`save-${row}`);
        btn.innerText = "⏳..."; btn.disabled = true;

        await fetch(API_URL, {
            method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'updateStatusAdminOnly', row, qty, status })
        });
        showToast("บันทึกข้อมูลแล้ว");
        btn.innerText = "💾 อัปเดต"; btn.disabled = false;
    }

    async function notifyLine(row, lineId, orderId) {
        if (!lineId || lineId === "undefined") return alert("ไม่พบ LINE ID");
        const status = document.getElementById(`status-${row}`).value;
        if (!confirm(`ยืนยันแจ้งสถานะ "${status}" ไปที่ LINE?`)) return;

        const btn = document.getElementById(`line-${row}`);
        btn.innerText = "⏳..."; btn.disabled = true;

        await fetch(API_URL, {
            method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'notifyLineManual', lineUserId: lineId, orderId, status })
        });
        showToast("ส่งแจ้งเตือนแล้ว");
        btn.innerText = "🔔 แจ้ง LINE"; btn.disabled = false;
    }

    async function loadStatus() {
        const input = document.getElementById('search-input').value;
        const res = document.getElementById('status-result');
        res.innerHTML = "กำลังค้นหา...";
        const resp = await fetch(`${API_URL}?action=getOrders`);
        const orders = await resp.json();
        const found = orders.filter(o => o.customerName.includes(input) || o.orderId.includes(input));
        
        res.innerHTML = found.length ? '' : 'ไม่พบข้อมูล';
        found.reverse().forEach(o => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<strong>#${o.orderId}</strong> - ${o.status}<br><small>${o.timestamp}</small>`;
            res.appendChild(div);
        });
    }
</script>
</body>
</html>
