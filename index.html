<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Matcha Catalog</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e5c23; --accent: #b71c1c; --bg: #f4f6f5; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Profile & Tabs */
        .profile-card { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .tab-btn { padding: 10px 20px; border: none; background: white; border-radius: 10px; cursor: pointer; font-weight: 600; color: #777; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Shop Grid */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .price-tag { color: var(--accent); font-size: 1.2em; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: auto; }

        /* Cart & Status Table */
        .section-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: var(--primary); }
        .qty-input { width: 50px; padding: 5px; text-align: center; }

        /* Admin Style */
        .admin-row { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #ddd; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85em; color: white; background: #1565c0; }
        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 15px 30px; border-radius: 50px; z-index: 100; }
        #toast.show { visibility: visible; animation: fadeInUp 0.5s; }
        @keyframes fadeInUp { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 30px; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: var(--primary);">🍵 My Matcha Store</h1>

    <div class="profile-card">
        <div id="profile-info" style="display: none; align-items: center; gap: 10px;">
            <img id="profile-img" class="profile-img" src="">
            <span id="profile-name" style="font-weight: 600;"></span>
        </div>
        <button id="login-btn" onclick="liff.login()" style="display: none; background: #06C755; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Line Login</button>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" id="btn-shop" onclick="switchTab('shop')">🛒 สินค้า</button>
        <button class="tab-btn" id="btn-status" onclick="switchTab('status')">🔍 สถานะออเดอร์</button>
        <button class="tab-btn" id="btn-admin" onclick="switchTab('admin')" style="color: var(--accent);">🛠️ ADMIN</button>
    </div>

    <div id="view-shop">
        <div class="section-box" id="cart-box" style="display: none;">
            <h3>🛒 ตะกร้าสินค้า</h3>
            <table id="cart-table">
                <thead><tr><th>สินค้า</th><th>ราคา</th><th>จำนวน</th><th>รวม</th><th></th></tr></thead>
                <tbody id="cart-body"></tbody>
            </table>
            <div style="text-align: right; margin-top: 15px;">
                <h3 id="cart-total" style="color: var(--accent);">ยอดรวม: 0 JPY</h3>
                <button onclick="checkout()" style="background: #f57f17; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">✅ ยืนยันสั่งซื้อ</button>
            </div>
        </div>

        <div class="controls">
            <div>
                แสดงราคา: 
                <select id="currency" onchange="changeCurrency()">
                    <option value="JPY">เยน (JPY)</option>
                    <option value="THB">บาท (THB)</option>
                </select>
            </div>
            <div id="item-count">กำลังโหลดสินค้า...</div>
        </div>
        <div id="matcha-grid" class="grid"></div>
    </div>

    <div id="view-status" style="display: none;">
        <div class="section-box">
            <h3>🔍 ติดตามสถานะออเดอร์</h3>
            <div id="status-container">กรุณารอสักครู่...</div>
        </div>
    </div>

    <div id="view-admin" style="display: none;">
        <div id="admin-login" class="section-box" style="text-align: center;">
            <h3>🔒 ส่วนสำหรับแอดมิน</h3>
            <input type="password" id="admin-pass" placeholder="รหัสผ่าน" style="padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
            <button onclick="loginAdmin()" style="padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer;">เข้าสู่ระบบ</button>
        </div>
        <div id="admin-panel" style="display: none;">
            <div class="section-box">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>🛠️ จัดการออเดอร์</h3>
                    <button onclick="fetchAdminData()" style="background: #eee; border: 1px solid #ccc; padding: 5px 10px; border-radius: 5px;">🔄 โหลดข้อมูลใหม่</button>
                </div>
                <div id="admin-list"></div>
            </div>
        </div>
    </div>
</div>

<div id="toast">บันทึกข้อมูลเรียบร้อย</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyqTpO3AAjoWrNd3V1Frgy8Z5MbKtQC_gD2aWeytPAhfAdPMwbOMtYn8qd7B7HM50ZR/exec';
    const LIFF_ID = "2009818831-5fiCjFHH";
    let allProducts = [];
    let cart = [];
    let currentCurrency = 'JPY';
    let profile = null;

    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                profile = await liff.getProfile();
                document.getElementById('profile-info').style.display = 'flex';
                document.getElementById('profile-img').src = profile.pictureUrl;
                document.getElementById('profile-name').innerText = "สวัสดีคุณ " + profile.displayName;
            } else {
                document.getElementById('login-btn').style.display = 'block';
            }
        } catch (e) { console.error(e); }
        loadProducts();
    }

    async function loadProducts() {
        const res = await fetch(API_URL);
        allProducts = await res.json();
        renderShop();
    }

    function renderShop() {
        let html = '';
        allProducts.forEach((p, idx) => {
            const price = currentCurrency === 'JPY' ? p.Price_JPY + ' JPY' : p.Price_THB + ' THB';
            html += `
                <div class="card">
                    <img src="https://drive.google.com/thumbnail?id=${p['Image ID']}&sz=w400">
                    <div class="card-body">
                        <strong style="font-size: 1.1em;">${p['Product Name']}</strong>
                        <p style="margin: 5px 0; color: #666; font-size: 0.9em;">แบรนด์: ${p.Brand}</p>
                        <div class="price-tag">${price}</div>
                        <button class="btn-add" onclick="addToCart(${idx})">➕ เพิ่มลงตะกร้า</button>
                    </div>
                </div>`;
        });
        document.getElementById('matcha-grid').innerHTML = html;
        document.getElementById('item-count').innerText = `พบสินค้า ${allProducts.length} รายการ`;
    }

    function addToCart(idx) {
        const p = allProducts[idx];
        const exist = cart.find(c => c.name === p['Product Name']);
        if (exist) { exist.qty++; } 
        else {
            cart.push({ name: p['Product Name'], brand: p.Brand, priceJPY: p.Price_JPY, priceTHB: p.Price_THB, qty: 1, img: p['Image ID'] });
        }
        updateCartUI();
        showToast("เพิ่ม " + p['Product Name'] + " แล้ว");
    }

    function updateCartUI() {
        const box = document.getElementById('cart-box');
        if (cart.length === 0) { box.style.display = 'none'; return; }
        box.style.display = 'block';
        let html = '';
        let total = 0;
        cart.forEach((item, i) => {
            const p = currentCurrency === 'JPY' ? item.priceJPY : item.priceTHB;
            const sub = p * item.qty;
            total += sub;
            html += `<tr>
                <td>${item.name}</td>
                <td>${p.toLocaleString()}</td>
                <td><input type="number" class="qty-input" value="${item.qty}" min="1" onchange="changeQty(${i}, this.value)"></td>
                <td>${sub.toLocaleString()}</td>
                <td><button onclick="removeItem(${i})" style="color:red; border:none; background:none; cursor:pointer;">❌</button></td>
            </tr>`;
        });
        document.getElementById('cart-body').innerHTML = html;
        document.getElementById('cart-total').innerText = `ยอดรวม: ${total.toLocaleString()} ${currentCurrency}`;
    }

    function changeQty(i, val) { cart[i].qty = parseInt(val); updateCartUI(); }
    function removeItem(i) { cart.splice(i, 1); updateCartUI(); }
    function changeCurrency() { currentCurrency = document.getElementById('currency').value; renderShop(); updateCartUI(); }

    async function checkout() {
        if (!profile) { alert("กรุณา Login LINE ก่อนสั่งซื้อครับ"); return; }
        const orderId = 'ORD-' + Date.now().toString().slice(-6);
        let totalJPY = 0; let totalTHB = 0;
        const cartData = cart.map(c => {
            totalJPY += c.priceJPY * c.qty;
            totalTHB += c.priceTHB * c.qty;
            return { name: c.name, brand: c.brand, priceJPY: c.priceJPY, priceTHB: c.priceTHB, qty: c.qty, imageUrl: "https://drive.google.com/thumbnail?id=" + c.img };
        });

        const payload = { customerName: profile.displayName, orderId: orderId, lineUserId: profile.userId, totalJPY, totalTHB, cart: cartData };
        
        showToast("กำลังส่งออเดอร์...");
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert("สั่งซื้อสำเร็จ! เลขที่ออเดอร์ของคุณคือ: " + orderId);
        cart = []; updateCartUI();
    }

    async function fetchStatus() {
        if (!profile) { document.getElementById('status-container').innerText = "กรุณา Login LINE เพื่อดูสถานะของคุณ"; return; }
        const res = await fetch(`${API_URL}?action=checkStatus&uid=${profile.userId}`);
        const orders = await res.json();
        if (orders.length === 0) { document.getElementById('status-container').innerText = "ยังไม่มีประวัติการสั่งซื้อ"; return; }
        
        let html = '<table><tr><th>วันที่</th><th>รายการ</th><th>จำนวน</th><th>สถานะ</th></tr>';
        orders.forEach(o => {
            html += `<tr><td>${o.date}</td><td>${o.itemName}</td><td>${o.qty}</td><td><span class="status-badge">${o.status}</span></td></tr>`;
        });
        html += '</table>';
        document.getElementById('status-container').innerHTML = html;
    }

    function switchTab(tab) {
        document.getElementById('view-shop').style.display = tab === 'shop' ? 'block' : 'none';
        document.getElementById('view-status').style.display = tab === 'status' ? 'block' : 'none';
        document.getElementById('view-admin').style.display = tab === 'admin' ? 'block' : 'none';
        
        document.getElementById('btn-shop').classList.toggle('active', tab === 'shop');
        document.getElementById('btn-status').classList.toggle('active', tab === 'status');
        document.getElementById('btn-admin').classList.toggle('active', tab === 'admin');

        if (tab === 'status') fetchStatus();
    }

    function loginAdmin() {
        if (document.getElementById('admin-pass').value === '0640425461') {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            fetchAdminData();
        } else { alert("รหัสผ่านไม่ถูกต้อง"); }
    }

    async function fetchAdminData() {
        document.getElementById('admin-list').innerHTML = "กำลังโหลด...";
        const res = await fetch(`${API_URL}?action=adminFetch`);
        const data = await res.json();
        let html = '';
        let lastOrderId = '';
        let currentBg = '#fff';

        data.forEach(o => {
            if (o.orderId !== lastOrderId) {
                currentBg = (currentBg === '#fff') ? '#f2f9f1' : '#fff';
                lastOrderId = o.orderId;
            }
            html += `
                <div class="admin-row" style="background: ${currentBg};">
                    <img src="${o.imageUrl}" width="60" style="border-radius:8px;">
                    <div style="flex-grow:1;">
                        <small>#${o.orderId} | ${o.date}</small><br>
                        <strong>${o.name}</strong> - ${o.itemName}
                    </div>
                    <div style="text-align:right;">
                        <input type="number" value="${o.qty}" id="admin-qty-${o.row}" style="width:40px;"> ชิ้น<br>
                        <input type="text" value="${o.status}" id="admin-status-${o.row}" style="margin-top:5px; width:100px;"><br>
                        <button onclick="saveAdmin(${o.row})" style="margin-top:5px; background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">💾 บันทึก</button>
                    </div>
                </div>`;
        });
        document.getElementById('admin-list').innerHTML = html;
    }

    async function saveAdmin(row) {
        const qty = document.getElementById(`admin-qty-${row}`).value;
        const status = document.getElementById(`admin-status-${row}`).value;
        await fetch(API_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'updateStatusAdmin', row: row, qty: qty, status: status }) 
        });
        showToast("บันทึกข้อมูลแถวที่ " + row + " เรียบร้อย");
        fetchAdminData();
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    initLiff();
</script>
</body>
</html>
